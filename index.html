<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Cosmic Strike: Mobile Rage</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0088ff;
            --accent: #aa00ff;
            --danger: #ff0033;
            --success: #00cc00;
            --warning: #ffaa00;
            --bg-color: #050505;
            --ui-bg: rgba(17, 17, 17, 0.9);
            --border-col: #ffffff;
            --font-main: 'Press Start 2P', monospace;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            user-select: none; -webkit-tap-highlight-color: transparent; 
            touch-action: none;
        }
        
        body {
            background: var(--bg-color);
            font-family: var(--font-main);
            overflow: hidden;
            color: #fff;
            text-transform: uppercase;
            width: 100vw;
            height: 100vh;
        }

        canvas { position: fixed; inset: 0; z-index: 1; image-rendering: pixelated; width: 100%; height: 100%; }

        .hud {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 10;
            pointer-events: none;
            padding: env(safe-area-inset-top, 10px) 10px 10px 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .hud-top { display: flex; justify-content: space-between; gap: 5px; }
        .stat-box { 
            background: var(--ui-bg); 
            padding: 8px; 
            border: 2px solid var(--border-col); 
            flex: 1;
            text-align: center;
        }

        .stat-title { font-size: 7px; color: #aaa; margin-bottom: 4px; }
        .stat-value { font-size: 10px; color: #fff; }
        .best-score { font-size: 6px; color: var(--success); margin-top: 4px; }

        .bars { width: 100%; pointer-events: auto; }
        .bar-container { 
            height: 12px; border: 2px solid var(--border-col); 
            margin-bottom: 4px; background: #222; 
            position: relative; overflow: hidden;
        }
        .bar-fill { height: 100%; width: 100%; transition: width 0.2s ease-out; }
        .bar-label { position: absolute; font-size: 7px; top: 1px; left: 6px; color: #fff; z-index: 2; text-shadow: 1px 1px 0 #000; }

        .sys-btns { 
            position: absolute; 
            top: 50%; right: 10px; transform: translateY(-50%);
            pointer-events: auto; display: flex; flex-direction: column; gap: 15px; z-index: 100; 
        }
        
        .side-btn {
            background: var(--ui-bg); border: 2px solid var(--border-col);
            color: #fff; padding: 12px 8px; font-size: 9px; font-family: var(--font-main);
            cursor: pointer; text-align: center; box-shadow: 3px 3px 0 #000;
            writing-mode: vertical-rl; text-orientation: mixed;
        }
        .side-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 #000; }

        .ui-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 5000; display: none; flex-direction: column; padding: 20px;
            border: 4px solid; margin: env(safe-area-inset-top, 10px) 10px;
        }
        
        .modal-header { display: flex; justify-content: space-between; border-bottom: 2px solid; padding-bottom: 15px; margin-bottom: 15px; font-size: 10px; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; overflow-y: auto; flex: 1; }
        
        .card { background: #111; border: 2px solid #444; padding: 10px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; }
        .card.active { border-color: var(--success); background: #0a220a; }
        .card h3 { font-size: 8px; margin-bottom: 5px; }
        .card p { font-size: 6px; color: #888; }

        .buy-btn { background: var(--warning); color: #000; border: none; font-family: var(--font-main); font-size: 8px; padding: 8px; margin-top: 5px; }
        .buy-btn:disabled { background: #555; color: #888; }

        .skills-container {
            position: fixed; bottom: env(safe-area-inset-bottom, 30px); left: 0; right: 0;
            display: flex; justify-content: center; gap: 40px;
            z-index: 500; pointer-events: none;
        }
        .skill-btn {
            width: 70px; height: 70px;
            background: var(--ui-bg); border: 3px solid var(--border-col);
            color: #fff; font-family: var(--font-main); font-size: 8px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: auto; border-radius: 50%; position: relative;
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }
        .skill-btn.disabled { opacity: 0.5; filter: grayscale(1); }
        .skill-cd { position: absolute; bottom: -20px; font-size: 8px; color: #fff; }
        #btn-emp { border-color: var(--primary); color: var(--primary); }
        #btn-hyper { border-color: var(--success); color: var(--success); }

        #start-screen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px;
        }
        .start-btn { padding: 20px; width: 100%; max-width: 300px; background: var(--primary); color: #fff; border: 4px solid #fff; font-family: var(--font-main); font-size: 12px; margin-top: 20px; }

        #boss-warning {
            position: fixed; top: 30%; left: 0; right: 0; text-align: center;
            color: var(--danger); font-size: 20px; z-index: 1000; display: none;
            animation: blink 0.5s infinite; text-shadow: 0 0 10px #ff0000;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="boss-warning">BOSS APPROACHING</div>

<div id="start-screen">
    <h1 style="text-align:center; font-size: 20px;">COSMIC STRIKE<br><span style="color:var(--accent)">RAGE MOBILE</span></h1>
    <div style="margin-top: 30px; text-align: center;">
        <p style="font-size: 8px; color: #aaa;">BEST CLEAN SCORE:</p>
        <p id="best-score-display" style="font-size: 12px; color: var(--success); margin-top:5px;">0</p>
    </div>
    <button class="start-btn" onclick="startGame()">START MISSION</button>
</div>

<div class="hud">
    <div class="hud-top">
        <div class="stat-box">
            <div class="stat-title">SCORE</div>
            <div id="score-val" class="stat-value">0</div>
            <div id="cheat-indicator" style="font-size: 6px; color: var(--danger); display: none; margin-top: 2px;">[CHEAT SESSION]</div>
        </div>
        <div class="stat-box">
            <div class="stat-title">WAVE</div>
            <div id="wave-val" class="stat-value">01</div>
            <div class="best-score">CR: <span id="cred-val">0</span></div>
        </div>
    </div>
    <div class="bars">
        <div class="bar-container"><div class="bar-label">HULL</div><div id="hp-fill" class="bar-fill" style="background: var(--danger);"></div></div>
        <div class="bar-container"><div class="bar-label">SHIELD</div><div id="sh-fill" class="bar-fill" style="background: var(--primary);"></div></div>
    </div>
</div>

<div class="sys-btns">
    <div class="side-btn" onclick="toggleModal('cheat-ui')" style="color: var(--accent); border-color: var(--accent);">RAGE_MENU</div>
    <div class="side-btn" onclick="toggleModal('shop-ui')" style="color: var(--warning); border-color: var(--warning);">SHOP</div>
</div>

<!-- Модалки -->
<div id="cheat-ui" class="ui-modal" style="border-color: var(--accent);">
    <div class="modal-header" style="color: var(--accent);"><span>RAGE TERMINAL v5.0</span><span onclick="toggleModal('cheat-ui')">[X]</span></div>
    <div class="grid-container">
        <div class="card" id="cheat-god" onclick="toggleCheat('god')"><h3>GOD_MODE</h3><p>INVINCIBILITY</p></div>
        <div class="card" id="cheat-rapid" onclick="toggleCheat('rapid')"><h3>RAPID_FIRE</h3><p>MAX SPEED</p></div>
        <div class="card" id="cheat-insta" onclick="toggleCheat('insta')"><h3>INSTA_KILL</h3><p>1-HIT KILL</p></div>
        <div class="card" id="cheat-money" onclick="toggleCheat('money')"><h3>INFINITE_CR</h3><p>MONEY RAIN</p></div>
    </div>
    <button class="side-btn" style="writing-mode:horizontal-tb; width:100%; margin-top:10px;" onclick="toggleModal('cheat-ui')">RESUME</button>
</div>

<div id="shop-ui" class="ui-modal" style="border-color: var(--warning);">
    <div class="modal-header" style="color: var(--warning);"><span>ARMORY</span><span onclick="toggleModal('shop-ui')">[X]</span></div>
    <div style="text-align:center; color:var(--warning); margin-bottom:10px; font-size:10px;">CREDITS: <span id="shop-cred-val">0</span></div>
    <div class="grid-container" id="shop-grid"></div>
    <button class="side-btn" style="writing-mode:horizontal-tb; width:100%; margin-top:10px;" onclick="toggleModal('shop-ui')">RESUME</button>
</div>

<div class="skills-container">
    <div class="skill-btn" id="btn-emp" onclick="useAbility('emp')">
        <span>EMP</span>
        <span class="skill-cd" id="cd-emp">READY</span>
    </div>
    <div class="skill-btn" id="btn-hyper" onclick="useAbility('hyper')">
        <span>HYPER</span>
        <span class="skill-cd" id="cd-hyper">READY</span>
    </div>
</div>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d', { alpha: false });
    let w, h, gameActive = false, frame = 0;
    
    // Состояние игрока
    const player = {
        x: 0, y: 0, tx: 0, ty: 0,
        hp: 100, mHp: 100, sh: 100, mSh: 100,
        weapon: 1, fr: 1, 
        empCd: 0, hyperCd: 0, hyperT: 0,
        credits: 0, score: 0, wave: 1,
        usedCheats: false
    };

    let cheats = { god: false, rapid: false, insta: false, money: false };
    let enemies = [], bullets = [], enemyBullets = [], particles = [], stars = [];
    let boss = null;

    const shipPixels = [
        [0,0,0,1,0,0,0],
        [0,0,1,2,1,0,0],
        [0,1,1,2,1,1,0],
        [1,1,3,1,3,1,1],
        [1,0,0,4,0,0,1]
    ];
    const pSize = 5;

    function init() {
        w = window.innerWidth; h = window.innerHeight;
        canvas.width = w * devicePixelRatio; canvas.height = h * devicePixelRatio;
        ctx.scale(devicePixelRatio, devicePixelRatio);
        player.x = player.tx = w/2; player.y = player.ty = h - 150;
        stars = Array.from({length: 50}, () => ({ x: Math.random()*w, y: Math.random()*h, v: Math.random()*2+1 }));
        document.getElementById('best-score-display').innerText = localStorage.getItem('cs_best_score') || 0;
    }

    function toggleModal(id) {
        const el = document.getElementById(id);
        el.style.display = el.style.display === 'flex' ? 'none' : 'flex';
        if (id === 'shop-ui') renderShop();
    }

    function toggleCheat(id) {
        cheats[id] = !cheats[id];
        player.usedCheats = true;
        document.getElementById('cheat-indicator').style.display = 'block';
        document.getElementById('cheat-'+id).classList.toggle('active');
    }

    function renderShop() {
        const shopData = [
            { id: 'weapon', name: 'WEAPON LVL', val: player.weapon, cost: 100 * player.weapon },
            { id: 'fr', name: 'FIRE RATE', val: player.fr, cost: 80 * player.fr },
            { id: 'hp', name: 'MAX HULL', val: player.mHp, cost: 50 + player.mHp },
            { id: 'sh', name: 'MAX SHIELD', val: player.mSh, cost: 50 + player.mSh }
        ];
        document.getElementById('shop-cred-val').innerText = player.credits;
        document.getElementById('shop-grid').innerHTML = shopData.map(item => `
            <div class="card">
                <h3>${item.name}</h3>
                <p>CUR: ${item.val}</p>
                <button class="buy-btn" ${player.credits < item.cost ? 'disabled' : ''} onclick="buy('${item.id}', ${item.cost})">${item.cost} CR</button>
            </div>
        `).join('');
    }

    function buy(id, cost) {
        if (player.credits < cost) return;
        player.credits -= cost;
        if (id === 'weapon') player.weapon++;
        if (id === 'fr') player.fr++;
        if (id === 'hp') { player.mHp += 50; player.hp = player.mHp; }
        if (id === 'sh') { player.mSh += 50; player.sh = player.mSh; }
        renderShop();
    }

    function useAbility(type) {
        if (type === 'emp' && player.empCd <= 0) {
            enemyBullets = [];
            enemies.forEach(e => { e.hp -= 50; createExplosion(e.x, e.y, '#fff', 5); });
            player.empCd = 600; // 10 сек
            createExplosion(player.x, player.y, varColor('--primary'), 30);
        }
        if (type === 'hyper' && player.hyperCd <= 0) {
            player.hyperT = 300; // 5 сек
            player.hyperCd = 900; // 15 сек
        }
    }

    function createExplosion(x, y, c, n) {
        for(let i=0; i<n; i++) particles.push({ x, y, c, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, l: 1 });
    }

    function spawnBoss() {
        const type = Math.floor(player.wave / 10);
        boss = {
            x: w/2, y: -100, tx: w/2, ty: 120,
            hp: 500 * type, mHp: 500 * type,
            size: 80, type: type,
            attackTimer: 0,
            col: type % 2 === 0 ? varColor('--accent') : varColor('--danger')
        };
        document.getElementById('boss-warning').style.display = 'block';
        setTimeout(() => document.getElementById('boss-warning').style.display = 'none', 3000);
    }

    function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

    function update() {
        if (!gameActive) return;
        frame++;
        if (cheats.money) player.credits += 5;

        // Player Movement
        player.x += (player.tx - player.x) * 0.15;
        player.y += (player.ty - player.y) * 0.15;

        // Abilities logic
        if (player.empCd > 0) player.empCd--;
        if (player.hyperCd > 0) player.hyperCd--;
        if (player.hyperT > 0) player.hyperT--;

        document.getElementById('cd-emp').innerText = player.empCd > 0 ? Math.ceil(player.empCd/60) + 's' : 'READY';
        document.getElementById('cd-hyper').innerText = player.hyperCd > 0 ? Math.ceil(player.hyperCd/60) + 's' : 'READY';
        document.getElementById('btn-emp').classList.toggle('disabled', player.empCd > 0);
        document.getElementById('btn-hyper').classList.toggle('disabled', player.hyperCd > 0);

        // Stars & Waves
        stars.forEach(s => { s.y += s.v; if(s.y > h) s.y = -10; });
        if (frame % 1000 === 0) {
            player.wave++;
            if (player.wave % 10 === 0) spawnBoss();
        }

        // Enemies
        if (!boss && Math.random() < 0.02 + (player.wave * 0.002)) {
            enemies.push({ x: Math.random()*w, y: -20, hp: 10 + player.wave*2, size: 20, col: varColor('--danger'), v: 2 + Math.random()*2 });
        }

        enemies.forEach((e, i) => {
            e.y += e.v;
            if (e.y > h) enemies.splice(i, 1);
            if (Math.hypot(e.x - player.x, e.y - player.y) < 30) {
                if (!cheats.god && player.hyperT <= 0) {
                    if (player.sh > 0) player.sh -= 10; else player.hp -= 10;
                }
                createExplosion(e.x, e.y, e.col, 10);
                enemies.splice(i, 1);
            }
        });

        // Boss Logic
        if (boss) {
            boss.y += (boss.ty - boss.y) * 0.02;
            boss.x += Math.sin(frame * 0.02) * 2;
            boss.attackTimer++;

            // Boss Attacks
            if (boss.attackTimer > 60) {
                boss.attackTimer = 0;
                if (boss.type === 1) { // Spread
                    for(let i=-2; i<=2; i++) enemyBullets.push({ x: boss.x, y: boss.y, vx: i, vy: 5 });
                } else if (boss.type === 2) { // Aimed
                    let angle = Math.atan2(player.y - boss.y, player.x - boss.x);
                    enemyBullets.push({ x: boss.x, y: boss.y, vx: Math.cos(angle)*6, vy: Math.sin(angle)*6 });
                } else { // Circle
                    for(let i=0; i<8; i++) {
                        let a = (Math.PI*2/8)*i + (frame*0.05);
                        enemyBullets.push({ x: boss.x, y: boss.y, vx: Math.cos(a)*4, vy: Math.sin(a)*4 });
                    }
                }
            }

            if (boss.hp <= 0) {
                createExplosion(boss.x, boss.y, boss.col, 50);
                player.score += 5000; player.credits += 500;
                boss = null;
            }
        }

        // Shooting
        let fr = player.hyperT > 0 ? 3 : Math.max(4, 15 - player.fr);
        if (cheats.rapid) fr = 2;
        if (frame % fr === 0) {
            let dmg = (player.weapon * 5) * (cheats.insta ? 100 : 1);
            bullets.push({ x: player.x, y: player.y - 20, vy: -12, dmg: dmg });
            if (player.weapon >= 3) {
                bullets.push({ x: player.x - 10, y: player.y - 10, vy: -11, vx: -1, dmg: dmg });
                bullets.push({ x: player.x + 10, y: player.y - 10, vy: -11, vx: 1, dmg: dmg });
            }
        }

        bullets.forEach((b, i) => {
            b.y += b.vy; b.x += (b.vx || 0);
            if (b.y < -20) bullets.splice(i, 1);
            
            if (boss && Math.hypot(b.x - boss.x, b.y - boss.y) < boss.size/2) {
                boss.hp -= b.dmg; bullets.splice(i, 1);
            }

            enemies.forEach((e, ei) => {
                if (Math.hypot(b.x - e.x, b.y - e.y) < e.size) {
                    e.hp -= b.dmg; bullets.splice(i, 1);
                    if (e.hp <= 0) {
                        createExplosion(e.x, e.y, e.col, 10);
                        enemies.splice(ei, 1);
                        player.score += 100; player.credits += 5;
                    }
                }
            });
        });

        enemyBullets.forEach((eb, i) => {
            eb.x += eb.vx; eb.y += eb.vy;
            if (eb.y > h || eb.y < -50 || eb.x < -50 || eb.x > w+50) enemyBullets.splice(i, 1);
            if (Math.hypot(eb.x - player.x, eb.y - player.y) < 15) {
                if (!cheats.god && player.hyperT <= 0) {
                    if (player.sh > 0) player.sh -= 15; else player.hp -= 15;
                }
                enemyBullets.splice(i, 1);
            }
        });

        // HUD & Death
        document.getElementById('hp-fill').style.width = (player.hp / player.mHp * 100) + '%';
        document.getElementById('sh-fill').style.width = (player.sh / player.mSh * 100) + '%';
        document.getElementById('score-val').innerText = player.score;
        document.getElementById('wave-val').innerText = player.wave;
        document.getElementById('cred-val').innerText = player.credits;

        if (player.hp <= 0) gameOver();
        if (player.sh < player.mSh && frame % 60 === 0) player.sh++;

        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.l -= 0.02;
            if(p.l <= 0) particles.splice(i, 1);
        });
    }

    function gameOver() {
        gameActive = false;
        if (!player.usedCheats) {
            let best = parseInt(localStorage.getItem('cs_best_score') || 0);
            if (player.score > best) localStorage.setItem('cs_best_score', player.score);
        }
        document.getElementById('start-screen').style.display = 'flex';
    }

    function draw() {
        ctx.fillStyle = '#050505'; ctx.fillRect(0,0,w,h);
        ctx.fillStyle = '#444'; stars.forEach(s => ctx.fillRect(s.x, s.y, 2, 2));

        // Player
        const sx = player.x - (shipPixels[0].length * pSize)/2;
        const sy = player.y - (shipPixels.length * pSize)/2;
        shipPixels.forEach((row, r) => row.forEach((p, c) => {
            if (p) {
                if (p === 4) ctx.fillStyle = frame % 10 < 5 ? '#f80' : '#f00';
                else ctx.fillStyle = player.hyperT > 0 ? '#0ff' : ['','#ccc','#0ff','#555'][p];
                ctx.fillRect(sx + c*pSize, sy + r*pSize, pSize, pSize);
            }
        }));
        if (player.hyperT > 0) {
            ctx.strokeStyle = '#0ff'; ctx.beginPath(); ctx.arc(player.x, player.y, 35, 0, Math.PI*2); ctx.stroke();
        }

        // Boss
        if (boss) {
            ctx.fillStyle = boss.col; ctx.fillRect(boss.x - boss.size/2, boss.y - boss.size/2, boss.size, boss.size);
            ctx.strokeStyle = '#fff'; ctx.strokeRect(boss.x - boss.size/2, boss.y - boss.size/2, boss.size, boss.size);
            // Health bar boss
            ctx.fillStyle = '#444'; ctx.fillRect(boss.x - 40, boss.y - 60, 80, 6);
            ctx.fillStyle = varColor('--danger'); ctx.fillRect(boss.x - 40, boss.y - 60, (boss.hp/boss.mHp)*80, 6);
        }

        enemies.forEach(e => {
            ctx.fillStyle = e.col; ctx.fillRect(e.x-10, e.y-10, 20, 20);
            ctx.strokeStyle = '#fff'; ctx.strokeRect(e.x-10, e.y-10, 20, 20);
        });

        ctx.fillStyle = '#0ff'; bullets.forEach(b => ctx.fillRect(b.x-2, b.y, 4, 12));
        ctx.fillStyle = '#f0f'; enemyBullets.forEach(eb => ctx.fillRect(eb.x-3, eb.y-3, 6, 6));
        
        particles.forEach(p => {
            ctx.globalAlpha = p.l; ctx.fillStyle = p.c;
            ctx.fillRect(p.x, p.y, 4, 4);
        });
        ctx.globalAlpha = 1;
    }

    function startGame() {
        player.hp = player.mHp; player.sh = player.mSh;
        player.score = 0; player.wave = 1; player.credits = 0;
        player.usedCheats = false;
        enemies = []; bullets = []; enemyBullets = []; boss = null;
        document.getElementById('cheat-indicator').style.display = 'none';
        document.getElementById('start-screen').style.display = 'none';
        gameActive = true;
    }

    canvas.addEventListener('touchstart', e => {
        player.tx = e.touches[0].clientX; player.ty = e.touches[0].clientY - 60;
    });
    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        player.tx = e.touches[0].clientX; player.ty = e.touches[0].clientY - 60;
    }, {passive:false});

    window.addEventListener('resize', init);
    init();
    function loop() { update(); draw(); requestAnimationFrame(loop); }
    loop();
</script>
</body>
</html>
